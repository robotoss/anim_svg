<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 100 100" width="100" height="100">
  <style><![CDATA[
    #spin { animation: spin_kf 2s linear infinite normal forwards }
    @keyframes spin_kf {
      0%   { transform: translate(50px,50px) rotate(0deg) }
      100% { transform: translate(50px,50px) rotate(360deg) }
    }
  ]]></style>
  <defs>
    <image id="dot" width="10" height="10" xlink:href="data:image/webp;base64,Test"/>
  </defs>
  <g id="spin" transform="translate(50,50) rotate(0)">
    <use xlink:href="#dot" transform="translate(-5,-5)"/>
  </g>
</svg>
