name: anim_svg
description: >-
  Render animated SVG (SMIL, CSS @keyframes, Svgator) in Flutter by transpiling
  to Lottie JSON and delegating rasterisation to the native C++ thorvg
  renderer. Experimental. Pure-Dart converter, no custom SVG runtime.
version: 0.0.1
homepage: https://github.com/zoxo-outlook/anim_svg
repository: https://github.com/zoxo-outlook/anim_svg
issue_tracker: https://github.com/zoxo-outlook/anim_svg/issues
topics:
  - svg
  - animation
  - lottie
  - thorvg
  - smil

environment:
  sdk: ^3.10.4
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2
  xml: ^6.5.0
  meta: ^1.12.0
  thorvg: ^1.0.0
  image: ^4.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  test: ^1.25.0

flutter:
  plugin:
    platforms:
      android:
        package: com.zharume.anim_svg
        pluginClass: AnimSvgPlugin
      ios:
        pluginClass: AnimSvgPlugin
