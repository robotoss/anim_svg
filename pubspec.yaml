name: anim_svg
description: >-
  Flutter widget for animated SVG. Transpiles SMIL, CSS @keyframes, and Svgator
  animations to Lottie JSON, rendered by the native thorvg engine.
version: 0.0.2
homepage: https://github.com/robotoss/anim_svg
repository: https://github.com/robotoss/anim_svg
issue_tracker: https://github.com/robotoss/anim_svg/issues
topics:
  - svg
  - animation
  - lottie
  - thorvg
  - smil

environment:
  sdk: ^3.10.4
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  xml: ^6.5.0
  meta: ^1.12.0
  thorvg_plus: ^1.0.0
  image: ^4.2.0
  ffi: ^2.1.0
  flutter_cache_manager: ^3.4.1
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  test: ^1.25.0
  mocktail: ^1.0.0
  file: ^7.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.zharume.anim_svg
        pluginClass: AnimSvgPlugin
      ios:
        pluginClass: AnimSvgPlugin
