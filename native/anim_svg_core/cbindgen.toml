language = "C"
include_guard = "ANIM_SVG_CORE_H"
autogen_warning = "/* AUTO-GENERATED by cbindgen — do not edit. */"
style = "type"
cpp_compat = true
documentation = true
tab_width = 4

[parse]
parse_deps = false

[export]
prefix = ""
item_types = ["functions", "structs", "enums", "typedefs", "constants"]

[fn]
prefix = ""
args = "auto"
