name: thorvg_plus
description: >-
  Source-built fork of thorvg for Flutter with full iOS simulator support.
  Drop-in replacement while upstream thorvg.flutter#22 is unresolved.
version: 1.1.0
homepage: https://github.com/robotoss/anim_svg/tree/master/thorvg.flutter
repository: https://github.com/robotoss/anim_svg
issue_tracker: https://github.com/robotoss/anim_svg/issues
topics:
  - thorvg
  - lottie
  - rendering
  - ffi

environment:
  sdk: '>=3.2.4 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  ffi: ^2.1.2
  flutter:
    sdk: flutter

dev_dependencies:
  ffigen: ^9.0.0
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
        package: com.robotoss.thorvg_plus
        pluginClass: ThorvgPlusPlugin
      ios:
        ffiPlugin: true
        pluginClass: ThorvgPlusPlugin
